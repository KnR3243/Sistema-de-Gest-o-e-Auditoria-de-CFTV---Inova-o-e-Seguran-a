<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICC-CÂMERAS | Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.88)), url('fundo.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2vh 0;
        }

        header { 
            text-align: center; 
            flex-shrink: 0;
            animation: slideDown 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .logo-main { 
            width: 140px;
            margin-bottom: 10px; 
        }
        
        h1 { 
            color: white; 
            font-size: 32px; 
            font-weight: 900; 
            letter-spacing: 1px; 
        }
        
        .subtitle { 
            color: #a3a0a0; 
            letter-spacing: 4px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 850px;
            flex-grow: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px 20px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            text-align: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .icon-box {
            width: 75px;
            height: 75px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent);
            margin-bottom: 20px;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card:hover .icon-box { 
            background: var(--accent); 
            color: #000;
            transform: scale(1.05);
        }

        .card h3 { 
            color: white; 
            font-size: 20px; 
            font-weight: 700; 
            margin-bottom: 6px; 
        }
        
        .card p { 
            color: #444; 
            font-size: 9px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 800; 
        }

        footer { 
            flex-shrink: 0;
            padding: 40px; 
            color: #464646; 
            font-size: 17px; 
            letter-spacing: 4px; 
            font-weight: bold; 
            text-align: center;
        }

        @media (max-height: 800px) {
            .card { padding: 25px 15px; }
            .icon-box { width: 60px; height: 60px; font-size: 22px; margin-bottom: 15px; }
            h1 { font-size: 26px; }
            .logo-main { width: 110px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="ICC" class="logo-main">
        <h1>Gestão de Câmeras</h1>
        <p class="subtitle">Monitoramento & Segurança</p>
    </header>

    <main class="menu-grid">
        <div class="card" style="--accent: #4ade80;" onclick="window.location.href='checklist.html'">
            <div class="icon-box"><i class="fa-solid fa-clipboard-check"></i></div>
            <h3>Novo Checklist</h3>
            <p>Layout Operacional</p>
        </div>

        <div class="card" style="--accent: #94a3b8;" onclick="window.location.href='historico.html'">
            <div class="icon-box"><i class="fa-solid fa-clock-rotate-left"></i></div>
            <h3>Histórico</h3>
            <p>Consulta Digital</p>
        </div>

        <div class="card" style="--accent: #f59e0b;" onclick="window.location.href='cameras.html'">
            <div class="icon-box"><i class="fa-solid fa-database"></i></div>
            <h3>Câmeras Ativas</h3>
            <p>Inventário de Ativos</p>
        </div>

        <div class="card" style="--accent: #3b82f6;" onclick="window.location.href='config.html'">
            <div class="icon-box"><i class="fa-solid fa-gears"></i></div>
            <h3>Configurações</h3>
            <p>Ajustes do Sistema</p>
        </div>
    </main>

    <footer>
        ICC BRAZIL · AGREGANDO VALOR À NUTRIÇÃO
    </footer>

</body>
<script>
    if (sessionStorage.getItem('scd_auth') !== 'true') {
        window.location.href = 'index.html';
    }
</script>
</html>
