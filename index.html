<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC-CÂMERAS | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('fundo.jpg') no-repeat center center;
            background-size: cover;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px 45px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: softIn 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes softIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo { width: 180px; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        
        h2 { color: white; font-weight: 900; letter-spacing: 3px; font-size: 24px; margin-bottom: 40px; }

        .input-group { margin-bottom: 20px; }
        
        input {
            width: 100%;
            padding: 18px 22px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            color: white;
            font-size: 16px;
            outline: none;
            /* Transição suave no foco */
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        input:focus { border-color: #22c55e; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 20px rgba(34, 197, 94, 0.1); }

        .btn-entrar {
            width: 100%;
            padding: 18px;
            background: #15803d;
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            margin-top: 15px;
        }

        .btn-entrar:hover { background: #16a34a; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .btn-entrar:active { transform: translateY(0); scale: 0.98; }

        .error-msg { color: #f87171; font-size: 13px; margin-top: 20px; font-weight: bold; display: none; }
        
        .btn-disabled { opacity: 0.7; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="logo.png" alt="ICC" class="logo">
        <h2>Gestão de Câmeras</h2>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="user" placeholder="USUÁRIO" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="SENHA" required>
            </div>
            <button type="submit" class="btn-entrar" id="btn-submit">Acessar Sistema</button>
            <div id="error" class="error-msg">Acesso negado. Tente novamente.</div>
        </form>
    </div>

    <script>
        const API_URL = "/api/proxy";

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const error = document.getElementById('error');
            const btn = document.getElementById('btn-submit');

            error.style.display = 'none';
            btn.innerText = 'Verificando...';
            btn.classList.add('btn-disabled');

            const payload = {
                acao: 'login',
                usuario: u,
                senha: p
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.sucesso) {
                    sessionStorage.setItem("scd_user", u);
                    sessionStorage.setItem("scd_profile", data.perfil);
                    
                    window.location.href = 'menu.html';
                } else {
                    error.innerText = "Usuário ou senha incorretos.";
                    error.style.display = 'block';
                    btn.innerText = 'Acessar Sistema';
                    btn.classList.remove('btn-disabled');
                }
            } catch (err) {
                error.innerText = "Erro de conexão com o servidor.";
                error.style.display = 'block';
                btn.innerText = 'Acessar Sistema';
                btn.classList.remove('btn-disabled');
                console.error(err);
            }
        });
    </script>
</body>
</html>
